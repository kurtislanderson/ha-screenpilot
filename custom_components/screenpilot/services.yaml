load_url:
  name: Load URL
  description: Navigate the kiosk browser to a URL
  fields:
    url:
      name: URL
      description: The URL to load
      required: true
      example: "https://example.com"
      selector:
        text:

execute_javascript:
  name: Execute JavaScript
  description: Run JavaScript code in the kiosk browser
  fields:
    script:
      name: Script
      description: JavaScript code to execute
      required: true
      example: "document.body.style.zoom = '150%'"
      selector:
        text:
          multiline: true

send_cec_command:
  name: Send CEC Command
  description: Send a CEC command to the TV
  fields:
    command:
      name: Command
      description: CEC command to send
      required: true
      selector:
        select:
          options:
            - "power_on"
            - "power_off"
            - "power_toggle"
            - "volume_up"
            - "volume_down"
            - "mute_toggle"
            - "active_source"
            - "inactive_source"
            - "input_hdmi1"
            - "input_hdmi2"
            - "input_hdmi3"
            - "input_hdmi4"

clear_data:
  name: Clear Browser Data
  description: Clear browser cache, cookies, or all data
  fields:
    data_type:
      name: Data Type
      description: Type of data to clear
      required: false
      default: "all"
      selector:
        select:
          options:
            - "cache"
            - "cookies"
            - "localStorage"
            - "all"

set_zoom:
  name: Set Zoom Level
  description: Set the browser zoom level
  fields:
    level:
      name: Zoom Level
      description: Zoom percentage (25-500)
      required: true
      selector:
        number:
          min: 25
          max: 500
          step: 5
          unit_of_measurement: "%"

show_overlay:
  name: Show Overlay
  description: Show a modal overlay panel over the current kiosk content
  fields:
    url:
      name: URL
      description: URL to load in the overlay panel (provide url or html)
      required: false
      example: "http://localhost/kiosk-files/info.html"
      selector:
        text:
    html:
      name: HTML
      description: Inline HTML to render in the overlay (provide url or html)
      required: false
      selector:
        text:
          multiline: true
    title:
      name: Title
      description: Optional panel title
      required: false
      selector:
        text:
    dismissible:
      name: Dismissible
      description: Show a close button and allow backdrop click to dismiss
      required: false
      default: true
      selector:
        boolean:
    width:
      name: Width
      description: CSS width, e.g. 80vw
      required: false
      example: "80vw"
      selector:
        text:
    height:
      name: Height
      description: CSS height, e.g. 80vh
      required: false
      example: "80vh"
      selector:
        text:
