name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    name: Validate HACS
    # HACS action has known issues with manifest detection - use hassfest as authoritative
    continue-on-error: true
    steps:
      - uses: "actions/checkout@v4"

      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
          # Ignore brands check until integration is registered in home-assistant/brands
          ignore: "brands"
          
  validate-hassfest:
    runs-on: "ubuntu-latest"
    name: Validate with hassfest
    steps:
      - uses: "actions/checkout@v4"
      
      - name: Run hassfest
        uses: "home-assistant/actions/hassfest@master"