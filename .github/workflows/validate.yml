name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    name: Validate HACS
    steps:
      - uses: "actions/checkout@v4"
      
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
          ignore: "brands hacsjson integration_manifest"
          
  validate-hassfest:
    runs-on: "ubuntu-latest"
    name: Validate with hassfest
    steps:
      - uses: "actions/checkout@v4"
      
      - name: Run hassfest
        uses: "home-assistant/actions/hassfest@master"