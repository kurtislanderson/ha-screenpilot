# ScreenPilot Secrets - Multi-Instance Support
# Add these to your Home Assistant secrets.yaml file

# ScreenPilot Instance 1 - Living Room Display
screenpilot_1_host: "192.168.1.100:8000"  # Replace with your ScreenPilot IP
screenpilot_1_token: "dev-token-12345"    # Replace with your API token
screenpilot_1_name: "Living Room Display"
screenpilot_1_auth_header: "Bearer dev-token-12345"

# URLs for Instance 1
screenpilot_1_status_url: "http://192.168.1.100:8000/api/system/info/"
screenpilot_1_kiosk_url: "http://192.168.1.100:8000/api/kiosk/url/"
screenpilot_1_kiosk_health_url: "http://192.168.1.100:8000/api/kiosk/health/"
screenpilot_1_kiosk_screenshot_url: "http://192.168.1.100:8000/api/kiosk/screenshot/"
screenpilot_1_cec_url: "http://192.168.1.100:8000/api/cec/status/"
screenpilot_1_service_status_url: "http://192.168.1.100:8000/api/status/service_status/"
screenpilot_1_logs_url: "http://192.168.1.100:8000/api/system/logs/"

# ScreenPilot Instance 2 - Kitchen Display
screenpilot_2_host: "192.168.1.101:8000"  # Replace with your ScreenPilot IP
screenpilot_2_token: "dev-token-67890"    # Replace with your API token
screenpilot_2_name: "Kitchen Display"
screenpilot_2_auth_header: "Bearer dev-token-67890"

# URLs for Instance 2
screenpilot_2_status_url: "http://192.168.1.101:8000/api/system/info/"
screenpilot_2_kiosk_url: "http://192.168.1.101:8000/api/kiosk/url/"
screenpilot_2_kiosk_health_url: "http://192.168.1.101:8000/api/kiosk/health/"
screenpilot_2_kiosk_screenshot_url: "http://192.168.1.101:8000/api/kiosk/screenshot/"
screenpilot_2_cec_url: "http://192.168.1.101:8000/api/cec/status/"
screenpilot_2_service_status_url: "http://192.168.1.101:8000/api/status/service_status/"
screenpilot_2_logs_url: "http://192.168.1.101:8000/api/system/logs/"

# Add more instances as needed following the same pattern:
