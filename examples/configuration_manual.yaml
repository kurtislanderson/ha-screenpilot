# ScreenPilot Home Assistant Configuration Example
# Add this to your Home Assistant configuration.yaml

# Secrets (add to secrets.yaml):
# screenpilot_host: "192.168.1.100:8000"
# screenpilot_token: "dev-token-12345"

# REST Commands for ScreenPilot Control
rest_command:
  screenpilot_set_url:
    url: "http://{{ host | default(states('input_text.screenpilot_host')) }}/api/kiosk/url/"
    method: PUT
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_token')) }}"
      Content-Type: "application/json"
    payload: '{"url": "{{ url }}"}'
    
  screenpilot_reload_page:
    url: "http://{{ host | default(states('input_text.screenpilot_host')) }}/api/kiosk/reload_currenturl/"
    method: GET
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_token')) }}"
      
  screenpilot_restart_browser:
    url: "http://{{ host | default(states('input_text.screenpilot_host')) }}/api/kiosk/reload/"
    method: GET
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_token')) }}"
    
  screenpilot_cec_command:
    url: "http://{{ host | default(states('input_text.screenpilot_host')) }}/api/cec/command/{{ command }}/"
    method: POST
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_token')) }}"
    
  screenpilot_reboot:
    url: "http://{{ host | default(states('input_text.screenpilot_host')) }}/api/system/reboot/"
    method: POST
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_token')) }}"
      
  screenpilot_clear_data:
    url: "http://{{ host | default(states('input_text.screenpilot_host')) }}/api/kiosk/clear_data/"
    method: POST
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_token')) }}"
      
  screenpilot_service_control:
    url: "http://{{ host | default(states('input_text.screenpilot_host')) }}/api/system/service/{{ service_name }}/{{ action }}/"
    method: POST
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_token')) }}"

# Sensors for monitoring
sensor:
  - platform: rest
    name: "ScreenPilot Status"
    resource: !secret screenpilot_status_url
    method: GET
    headers:
      Authorization: !secret screenpilot_auth_header
    value_template: "{{ 'Online' if value_json.hostname else 'Offline' }}"
    json_attributes:
      - hostname
      - os_version
      - ip_address
      - platform
      - cpu_percent
      - memory
      - disk
      - uptime
      - mock_mode
    scan_interval: 30
    
  - platform: rest
    name: "ScreenPilot Display URL"
    resource: !secret screenpilot_kiosk_url
    method: GET
    headers:
      Authorization: !secret screenpilot_auth_header
    value_template: "{{ value_json.url }}"
    scan_interval: 60
    
  - platform: rest
    name: "ScreenPilot TV Status"
    resource: !secret screenpilot_cec_url
    method: GET
    headers:
      Authorization: !secret screenpilot_auth_header
    value_template: "{{ value_json.power_status }}"
    json_attributes:
      - tv_present
      - power_status
      - available_commands
    scan_interval: 30
    
  - platform: rest
    name: "ScreenPilot Service Status"
    resource: !secret screenpilot_service_status_url
    method: GET
    headers:
      Authorization: !secret screenpilot_auth_header
    value_template: "{{ 'Healthy' if value_json.all_healthy else 'Unhealthy' }}"
    json_attributes:
      - timestamp
      - all_healthy
      - services
    scan_interval: 30
    
  - platform: rest
    name: "ScreenPilot Kiosk Health"
    resource: !secret screenpilot_kiosk_health_url
    method: GET
    headers:
      Authorization: !secret screenpilot_auth_header
    value_template: "{{ 'Healthy' if value_json.healthy else 'Unhealthy' }}"
    json_attributes:
      - healthy
      - browser_connected
      - last_heartbeat
      - heartbeat_age
      - current_url
      - startup_url
    scan_interval: 30

# Template sensors for better formatting
template:
  - sensor:
      - name: "ScreenPilot CPU"
        unit_of_measurement: "%"
        state: "{{ state_attr('sensor.screenpilot_status', 'cpu_percent') | round(1) }}"
        state_class: measurement
        
      - name: "ScreenPilot Memory"
        unit_of_measurement: "%"
        state: "{{ state_attr('sensor.screenpilot_status', 'memory')['percent'] | round(1) if state_attr('sensor.screenpilot_status', 'memory') else 0 }}"
        state_class: measurement
        
      - name: "ScreenPilot Disk"
        unit_of_measurement: "%"
        state: "{{ state_attr('sensor.screenpilot_status', 'disk')['percent'] | round(1) if state_attr('sensor.screenpilot_status', 'disk') else 0 }}"
        state_class: measurement
        
      - name: "ScreenPilot Uptime Formatted"
        state: >
          {% set uptime = state_attr('sensor.screenpilot_status', 'uptime') | int(0) %}
          {% set days = (uptime // 86400) %}
          {% set hours = ((uptime % 86400) // 3600) %}
          {% set minutes = ((uptime % 3600) // 60) %}
          {% if days > 0 %}
            {{ days }}d {{ hours }}h {{ minutes }}m
          {% elif hours > 0 %}
            {{ hours }}h {{ minutes }}m
          {% else %}
            {{ minutes }}m
          {% endif %}
        icon: mdi:timer-outline
        
      - name: "ScreenPilot Browser Status"
        state: >
          {% if state_attr('sensor.screenpilot_kiosk_health', 'browser_connected') %}
            Connected
          {% else %}
            Disconnected
          {% endif %}
        icon: >
          {% if state_attr('sensor.screenpilot_kiosk_health', 'browser_connected') %}
            mdi:web-check
          {% else %}
            mdi:web-off
          {% endif %}
          
      - name: "ScreenPilot Last Heartbeat"
        state: >
          {% set heartbeat_age = state_attr('sensor.screenpilot_kiosk_health', 'heartbeat_age') | int(999) %}
          {% if heartbeat_age < 60 %}
            {{ heartbeat_age }}s ago
          {% elif heartbeat_age < 3600 %}
            {{ (heartbeat_age // 60) }}m ago
          {% else %}
            {{ (heartbeat_age // 3600) }}h ago
          {% endif %}
        icon: mdi:heart-pulse

# Switches
switch:
  - platform: template
    switches:
      screenpilot_tv:
        friendly_name: "ScreenPilot TV"
        value_template: "{{ is_state('sensor.screenpilot_tv_status', 'on') }}"
        turn_on:
          service: rest_command.screenpilot_cec_command
          data:
            command: "power_on"
        turn_off:
          service: rest_command.screenpilot_cec_command
          data:
            command: "power_off"
        icon_template: >
          {% if is_state('sensor.screenpilot_tv_status', 'on') %}
            mdi:television
          {% else %}
            mdi:television-off
          {% endif %}

# Camera for screenshot
camera:
  - platform: generic
    name: "ScreenPilot Display"
    still_image_url: !secret screenpilot_kiosk_screenshot_url
    scan_interval: 30
    verify_ssl: false

# Input helpers for configuration
input_text:
  screenpilot_host:
    name: "ScreenPilot Host"
    initial: !secret screenpilot_host
    icon: mdi:ip-network
    
  screenpilot_token:
    name: "ScreenPilot API Token"
    initial: !secret screenpilot_token
    mode: password
    icon: mdi:key
    
  screenpilot_custom_url:
    name: "Custom URL"
    initial: "https://example.com"
    icon: mdi:web

input_select:
  screenpilot_preset_urls:
    name: "Preset URLs"
    options:
      - "Dashboard"
      - "Home Assistant"
      - "Weather"
      - "News"
      - "YouTube TV"
      - "Plex"
      - "Netflix"
      - "Custom URL"
    initial: "Dashboard"
    icon: mdi:bookmark

input_button:
  screenpilot_refresh:
    name: "Refresh Page"
    icon: mdi:refresh
    
  screenpilot_restart:
    name: "Restart Browser"
    icon: mdi:restart