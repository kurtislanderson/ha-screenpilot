# ScreenPilot Home Assistant Configuration - Multi-Instance Support
# This configuration supports multiple ScreenPilot devices in one Home Assistant

# Define your ScreenPilot instances in secrets.yaml:
# screenpilot_1_host: "192.168.1.100:8000"
# screenpilot_1_token: "dev-token-12345"
# screenpilot_1_name: "Living Room Display"
# 
# screenpilot_2_host: "192.168.1.101:8000"
# screenpilot_2_token: "dev-token-67890"
# screenpilot_2_name: "Kitchen Display"

# REST Commands for ALL endpoints - Instance 1
rest_command:
  # Kiosk Control
  screenpilot_1_set_url:
    url: "http://{{ host | default(states('input_text.screenpilot_1_host')) }}/api/kiosk/url/"
    method: PUT
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_1_token')) }}"
      Content-Type: "application/json"
    payload: '{"url": "{{ url }}"}'
    
  screenpilot_1_set_startup_url:
    url: "http://{{ host | default(states('input_text.screenpilot_1_host')) }}/api/kiosk/startup_url/"
    method: PUT
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_1_token')) }}"
      Content-Type: "application/json"
    payload: '{"url": "{{ url }}"}'
    
  screenpilot_1_reload_page:
    url: "http://{{ host | default(states('input_text.screenpilot_1_host')) }}/api/kiosk/reload_currenturl/"
    method: GET
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_1_token')) }}"
      
  screenpilot_1_restart_browser:
    url: "http://{{ host | default(states('input_text.screenpilot_1_host')) }}/api/kiosk/reload/"
    method: GET
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_1_token')) }}"
      
  screenpilot_1_clear_data:
    url: "http://{{ host | default(states('input_text.screenpilot_1_host')) }}/api/kiosk/clear_data/"
    method: POST
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_1_token')) }}"
      
  screenpilot_1_set_session_mode:
    url: "http://{{ host | default(states('input_text.screenpilot_1_host')) }}/api/kiosk/session_mode/"
    method: PUT
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_1_token')) }}"
      Content-Type: "application/json"
    payload: '{"mode": "{{ mode }}"}'
    
  # CEC Control
  screenpilot_1_cec_command:
    url: "http://{{ host | default(states('input_text.screenpilot_1_host')) }}/api/cec/command/{{ command }}/"
    method: POST
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_1_token')) }}"
    
  # System Control
  screenpilot_1_reboot:
    url: "http://{{ host | default(states('input_text.screenpilot_1_host')) }}/api/system/reboot/"
    method: POST
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_1_token')) }}"
      
  screenpilot_1_service_control:
    url: "http://{{ host | default(states('input_text.screenpilot_1_host')) }}/api/system/service/{{ service_name }}/{{ action }}/"
    method: POST
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_1_token')) }}"

# REST Commands - Instance 2 (duplicate for each additional instance)
  screenpilot_2_set_url:
    url: "http://{{ host | default(states('input_text.screenpilot_2_host')) }}/api/kiosk/url/"
    method: PUT
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_2_token')) }}"
      Content-Type: "application/json"
    payload: '{"url": "{{ url }}"}'
    
  screenpilot_2_reload_page:
    url: "http://{{ host | default(states('input_text.screenpilot_2_host')) }}/api/kiosk/reload_currenturl/"
    method: GET
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_2_token')) }}"
      
  screenpilot_2_restart_browser:
    url: "http://{{ host | default(states('input_text.screenpilot_2_host')) }}/api/kiosk/reload/"
    method: GET
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_2_token')) }}"
      
  screenpilot_2_cec_command:
    url: "http://{{ host | default(states('input_text.screenpilot_2_host')) }}/api/cec/command/{{ command }}/"
    method: POST
    headers:
      Authorization: "Bearer {{ token | default(states('input_text.screenpilot_2_token')) }}"

# Sensors for monitoring - Instance 1
sensor:
  # System Status
  - platform: rest
    name: "ScreenPilot 1 Status"
    resource: !secret screenpilot_1_status_url
    method: GET
    headers:
      Authorization: !secret screenpilot_1_auth_header
    value_template: "{{ 'Online' if value_json.hostname else 'Offline' }}"
    json_attributes:
      - hostname
      - os_version
      - ip_address
      - platform
      - cpu_percent
      - memory
      - disk
      - uptime
      - mock_mode
    scan_interval: 30
    
  # Kiosk Status
  - platform: rest
    name: "ScreenPilot 1 Kiosk URL"
    resource: !secret screenpilot_1_kiosk_url
    method: GET
    headers:
      Authorization: !secret screenpilot_1_auth_header
    value_template: "{{ value_json.url }}"
    json_attributes:
      - url
      - startup_url
    scan_interval: 60
    
  # Kiosk Health
  - platform: rest
    name: "ScreenPilot 1 Kiosk Health"
    resource: !secret screenpilot_1_kiosk_health_url
    method: GET
    headers:
      Authorization: !secret screenpilot_1_auth_header
    value_template: "{{ 'Healthy' if value_json.healthy else 'Unhealthy' }}"
    json_attributes:
      - healthy
      - browser_connected
      - last_heartbeat
      - heartbeat_age
      - current_url
      - startup_url
      - session_mode
    scan_interval: 30
    
  # Service Status
  - platform: rest
    name: "ScreenPilot 1 Service Status"
    resource: !secret screenpilot_1_service_status_url
    method: GET
    headers:
      Authorization: !secret screenpilot_1_auth_header
    value_template: "{{ 'Healthy' if value_json.all_healthy else 'Unhealthy' }}"
    json_attributes:
      - timestamp
      - all_healthy
      - services
    scan_interval: 30
    
  # CEC Status
  - platform: rest
    name: "ScreenPilot 1 TV Status"
    resource: !secret screenpilot_1_cec_url
    method: GET
    headers:
      Authorization: !secret screenpilot_1_auth_header
    value_template: "{{ value_json.power_status }}"
    json_attributes:
      - tv_present
      - power_status
      - available_commands
    scan_interval: 30
    
  # System Logs (optional - can be heavy)
  - platform: rest
    name: "ScreenPilot 1 Recent Logs"
    resource: !secret screenpilot_1_logs_url
    method: GET
    headers:
      Authorization: !secret screenpilot_1_auth_header
    value_template: "{{ value_json.logs | length }} lines"
    json_attributes:
      - logs
      - log_files
    scan_interval: 300  # 5 minutes

  # Sensors for Instance 2 (duplicate for each additional instance)
  - platform: rest
    name: "ScreenPilot 2 Status"
    resource: !secret screenpilot_2_status_url
    method: GET
    headers:
      Authorization: !secret screenpilot_2_auth_header
    value_template: "{{ 'Online' if value_json.hostname else 'Offline' }}"
    json_attributes:
      - hostname
      - os_version
      - ip_address
      - platform
      - cpu_percent
      - memory
      - disk
      - uptime
      - mock_mode
    scan_interval: 30

# Template sensors for better formatting
template:
  - sensor:
      # Instance 1 Templates
      - name: "ScreenPilot 1 CPU"
        unit_of_measurement: "%"
        state: "{{ state_attr('sensor.screenpilot_1_status', 'cpu_percent') | round(1) }}"
        state_class: measurement
        
      - name: "ScreenPilot 1 Memory"
        unit_of_measurement: "%"
        state: "{{ state_attr('sensor.screenpilot_1_status', 'memory')['percent'] | round(1) if state_attr('sensor.screenpilot_1_status', 'memory') else 0 }}"
        state_class: measurement
        
      - name: "ScreenPilot 1 Disk"
        unit_of_measurement: "%"
        state: "{{ state_attr('sensor.screenpilot_1_status', 'disk')['percent'] | round(1) if state_attr('sensor.screenpilot_1_status', 'disk') else 0 }}"
        state_class: measurement
        
      - name: "ScreenPilot 1 Uptime Formatted"
        state: >
          {% set uptime = state_attr('sensor.screenpilot_1_status', 'uptime') | int(0) %}
          {% set days = (uptime // 86400) %}
          {% set hours = ((uptime % 86400) // 3600) %}
          {% set minutes = ((uptime % 3600) // 60) %}
          {% if days > 0 %}
            {{ days }}d {{ hours }}h {{ minutes }}m
          {% elif hours > 0 %}
            {{ hours }}h {{ minutes }}m
          {% else %}
            {{ minutes }}m
          {% endif %}
        icon: mdi:timer-outline
        
      - name: "ScreenPilot 1 Browser Status"
        state: >
          {% if state_attr('sensor.screenpilot_1_kiosk_health', 'browser_connected') %}
            Connected
          {% else %}
            Disconnected
          {% endif %}
        icon: >
          {% if state_attr('sensor.screenpilot_1_kiosk_health', 'browser_connected') %}
            mdi:web-check
          {% else %}
            mdi:web-off
          {% endif %}
          
      - name: "ScreenPilot 1 Last Heartbeat"
        state: >
          {% set heartbeat_age = state_attr('sensor.screenpilot_1_kiosk_health', 'heartbeat_age') | int(999) %}
          {% if heartbeat_age < 60 %}
            {{ heartbeat_age }}s ago
          {% elif heartbeat_age < 3600 %}
            {{ (heartbeat_age // 60) }}m ago
          {% else %}
            {{ (heartbeat_age // 3600) }}h ago
          {% endif %}
        icon: mdi:heart-pulse
        
      - name: "ScreenPilot 1 Session Mode"
        state: "{{ state_attr('sensor.screenpilot_1_kiosk_health', 'session_mode') | default('normal') }}"
        icon: >
          {% if state_attr('sensor.screenpilot_1_kiosk_health', 'session_mode') == 'persistent' %}
            mdi:lock
          {% else %}
            mdi:lock-open
          {% endif %}
          
      # Service health breakdown
      - name: "ScreenPilot 1 Django Health"
        state: >
          {% set services = state_attr('sensor.screenpilot_1_service_status', 'services') %}
          {% if services %}
            {% set django = services | selectattr('name', 'eq', 'screenpilot-asgi.service') | first | default(none) %}
            {{ 'Healthy' if django and django.healthy else 'Unhealthy' }}
          {% else %}
            Unknown
          {% endif %}
        icon: mdi:django
        
      - name: "ScreenPilot 1 Kiosk Service Health"
        state: >
          {% set services = state_attr('sensor.screenpilot_1_service_status', 'services') %}
          {% if services %}
            {% set kiosk = services | selectattr('name', 'eq', 'screenpilot-kiosk.service') | first | default(none) %}
            {{ 'Healthy' if kiosk and kiosk.healthy else 'Unhealthy' }}
          {% else %}
            Unknown
          {% endif %}
        icon: mdi:application

# Switches
switch:
  - platform: template
    switches:
      screenpilot_1_tv:
        friendly_name: !secret screenpilot_1_name
        value_template: "{{ is_state('sensor.screenpilot_1_tv_status', 'on') }}"
        turn_on:
          service: rest_command.screenpilot_1_cec_command
          data:
            command: "power_on"
        turn_off:
          service: rest_command.screenpilot_1_cec_command
          data:
            command: "power_off"
        icon_template: >
          {% if is_state('sensor.screenpilot_1_tv_status', 'on') %}
            mdi:television
          {% else %}
            mdi:television-off
          {% endif %}
          
      screenpilot_2_tv:
        friendly_name: !secret screenpilot_2_name
        value_template: "{{ is_state('sensor.screenpilot_2_tv_status', 'on') }}"
        turn_on:
          service: rest_command.screenpilot_2_cec_command
          data:
            command: "power_on"
        turn_off:
          service: rest_command.screenpilot_2_cec_command
          data:
            command: "power_off"
        icon_template: >
          {% if is_state('sensor.screenpilot_2_tv_status', 'on') %}
            mdi:television
          {% else %}
            mdi:television-off
          {% endif %}

# Camera for screenshots
camera:
  - platform: generic
    name: "ScreenPilot 1 Display"
    still_image_url: !secret screenpilot_1_kiosk_screenshot_url
    scan_interval: 30
    verify_ssl: false
    
  - platform: generic
    name: "ScreenPilot 2 Display"
    still_image_url: !secret screenpilot_2_kiosk_screenshot_url
    scan_interval: 30
    verify_ssl: false

# Input helpers for configuration
input_text:
  screenpilot_1_host:
    name: "ScreenPilot 1 Host"
    initial: !secret screenpilot_1_host
    icon: mdi:ip-network
    
  screenpilot_1_token:
    name: "ScreenPilot 1 API Token"
    initial: !secret screenpilot_1_token
    mode: password
    icon: mdi:key
    
  screenpilot_2_host:
    name: "ScreenPilot 2 Host"
    initial: !secret screenpilot_2_host
    icon: mdi:ip-network
    
  screenpilot_2_token:
    name: "ScreenPilot 2 API Token"
    initial: !secret screenpilot_2_token
    mode: password
    icon: mdi:key
    
  screenpilot_custom_url:
    name: "Custom URL"
    initial: "https://example.com"
    icon: mdi:web

input_select:
  screenpilot_preset_urls:
    name: "Preset URLs"
    options:
      - "Dashboard"
      - "Home Assistant"
      - "Weather"
      - "News"
      - "YouTube TV"
      - "Plex"
      - "Netflix"
      - "Custom URL"
    initial: "Dashboard"
    icon: mdi:bookmark
    
  screenpilot_target_instance:
    name: "Target ScreenPilot"
    options:
      - "All"
      - "ScreenPilot 1"
      - "ScreenPilot 2"
    initial: "All"
    icon: mdi:monitor-multiple

input_button:
  screenpilot_refresh:
    name: "Refresh Page"
    icon: mdi:refresh
    
  screenpilot_restart:
    name: "Restart Browser"
    icon: mdi:restart
    
  screenpilot_clear_data:
    name: "Clear Browser Data"
    icon: mdi:delete-sweep

# Scripts for easier multi-instance control
script:
  screenpilot_set_url_all:
    alias: "Set URL on All ScreenPilots"
    sequence:
      - service: rest_command.screenpilot_1_set_url
        data:
          url: "{{ url }}"
      - service: rest_command.screenpilot_2_set_url
        data:
          url: "{{ url }}"
          
  screenpilot_reload_all:
    alias: "Reload All ScreenPilots"
    sequence:
      - service: rest_command.screenpilot_1_reload_page
      - service: rest_command.screenpilot_2_reload_page
      
  screenpilot_cec_all:
    alias: "Send CEC Command to All"
    sequence:
      - service: rest_command.screenpilot_1_cec_command
        data:
          command: "{{ command }}"
      - service: rest_command.screenpilot_2_cec_command
        data:
          command: "{{ command }}"
          
  screenpilot_set_session_mode_all:
    alias: "Set Session Mode on All"
    sequence:
      - service: rest_command.screenpilot_1_set_session_mode
        data:
          mode: "{{ mode }}"
      - service: rest_command.screenpilot_2_set_session_mode
        data:
          mode: "{{ mode }}"