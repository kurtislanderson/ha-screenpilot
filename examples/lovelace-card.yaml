# ScreenPilot Lovelace Card Configuration
# Add this as a manual card in your Home Assistant dashboard

type: vertical-stack
cards:
  # Header with status
  - type: markdown
    content: |
      # ScreenPilot Control
      **Status:** {{ states('sensor.screenpilot_status') }}
      **Current URL:** {{ states('sensor.screenpilot_display_url') | truncate(50) }}
      **TV:** {{ states('sensor.screenpilot_tv_status') | title }}
      
  # Main controls
  - type: horizontal-stack
    cards:
      - type: button
        name: TV Power
        entity: switch.screenpilot_tv
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        icon_height: 40px
        
      - type: button
        name: Refresh
        icon: mdi:refresh
        tap_action:
          action: call-service
          service: input_button.press
          service_data:
            entity_id: input_button.screenpilot_refresh
        icon_height: 40px
        
      - type: button
        name: Restart
        icon: mdi:restart
        tap_action:
          action: call-service
          service: input_button.press
          service_data:
            entity_id: input_button.screenpilot_restart
        icon_height: 40px
  
  # URL controls
  - type: entities
    show_header_toggle: false
    entities:
      - entity: input_select.screenpilot_preset_urls
        name: Quick Links
      - entity: input_text.screenpilot_custom_url
        name: Custom URL
  
  # Screenshot preview
  - type: picture-entity
    entity: camera.screenpilot_display
    camera_view: live
    show_state: false
    show_name: false
    tap_action:
      action: more-info
  
  # CEC controls
  - type: grid
    columns: 4
    cards:
      - type: button
        name: Vol-
        icon: mdi:volume-minus
        tap_action:
          action: call-service
          service: rest_command.screenpilot_cec_command
          service_data:
            command: volume_down
            
      - type: button
        name: Vol+
        icon: mdi:volume-plus
        tap_action:
          action: call-service
          service: rest_command.screenpilot_cec_command
          service_data:
            command: volume_up
            
      - type: button
        name: Mute
        icon: mdi:volume-mute
        tap_action:
          action: call-service
          service: rest_command.screenpilot_cec_command
          service_data:
            command: mute
            
      - type: button
        name: Input
        icon: mdi:video-input-hdmi
        tap_action:
          action: call-service
          service: rest_command.screenpilot_cec_command
          service_data:
            command: input_hdmi1
  
  # System stats
  - type: entities
    title: System Information
    show_header_toggle: false
    entities:
      - entity: sensor.screenpilot_cpu
        name: CPU Usage
        icon: mdi:cpu-64-bit
      - entity: sensor.screenpilot_memory
        name: Memory Usage
        icon: mdi:memory
      - entity: sensor.screenpilot_disk
        name: Disk Usage
        icon: mdi:harddisk
      - entity: sensor.screenpilot_uptime_formatted
        name: Uptime
        
  # Advanced controls (collapsible)
  - type: conditional
    conditions:
      - entity: input_boolean.screenpilot_show_advanced
        state: "on"
    card:
      type: entities
      title: Advanced Controls
      entities:
        - type: button
          name: Reboot ScreenPilot
          icon: mdi:restart-alert
          action_name: REBOOT
          tap_action:
            action: call-service
            service: rest_command.screenpilot_reboot
            confirmation:
              text: Are you sure you want to reboot ScreenPilot?
        - entity: input_text.screenpilot_host
          name: Host Address
        - entity: input_text.screenpilot_token
          name: API Token
          
  # Toggle for advanced controls
  - type: entities
    entities:
      - entity: input_boolean.screenpilot_show_advanced
        name: Show Advanced Options