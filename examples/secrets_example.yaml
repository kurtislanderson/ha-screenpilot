# ScreenPilot Secrets
# Add these to your Home Assistant secrets.yaml file

# ScreenPilot connection details
screenpilot_host: "192.168.1.100:8000"  # Replace with your ScreenPilot IP
screenpilot_token: "dev-token-12345"    # Replace with your API token

# Full URLs for REST sensors
screenpilot_status_url: "http://192.168.1.100:8000/api/system/info/"
screenpilot_kiosk_url: "http://192.168.1.100:8000/api/kiosk/url/"
screenpilot_cec_url: "http://192.168.1.100:8000/api/cec/status/"
screenpilot_kiosk_screenshot_url: "http://192.168.1.100:8000/api/kiosk/screenshot/"
screenpilot_service_status_url: "http://192.168.1.100:8000/api/status/service_status/"
screenpilot_kiosk_health_url: "http://192.168.1.100:8000/api/kiosk/health/"

# Authorization header
screenpilot_auth_header: "Bearer dev-token-12345"