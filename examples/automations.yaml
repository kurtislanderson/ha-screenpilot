# ScreenPilot Automations for Home Assistant

# Handle preset URL selection
- id: 'screenpilot_preset_url_handler'
  alias: 'ScreenPilot: Handle Preset URL'
  description: 'Navigate to selected preset URL'
  trigger:
    - platform: state
      entity_id: input_select.screenpilot_preset_urls
  condition: []
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.screenpilot_preset_urls
              state: 'Dashboard'
          sequence:
            - service: rest_command.screenpilot_set_url
              data:
                url: "http://{{ states('input_text.screenpilot_host') }}/"
                
        - conditions:
            - condition: state
              entity_id: input_select.screenpilot_preset_urls
              state: 'Home Assistant'
          sequence:
            - service: rest_command.screenpilot_set_url
              data:
                url: "http://{{ states('input_text.home_assistant_internal_url') | default('homeassistant.local:8123') }}/lovelace"
                
        - conditions:
            - condition: state
              entity_id: input_select.screenpilot_preset_urls
              state: 'Weather'
          sequence:
            - service: rest_command.screenpilot_set_url
              data:
                url: "https://weather.com"
                
        - conditions:
            - condition: state
              entity_id: input_select.screenpilot_preset_urls
              state: 'News'
          sequence:
            - service: rest_command.screenpilot_set_url
              data:
                url: "https://news.google.com"
                
        - conditions:
            - condition: state
              entity_id: input_select.screenpilot_preset_urls
              state: 'YouTube TV'
          sequence:
            - service: rest_command.screenpilot_set_url
              data:
                url: "https://youtube.com/tv"
                
        - conditions:
            - condition: state
              entity_id: input_select.screenpilot_preset_urls
              state: 'Plex'
          sequence:
            - service: rest_command.screenpilot_set_url
              data:
                url: "https://app.plex.tv/desktop"
                
        - conditions:
            - condition: state
              entity_id: input_select.screenpilot_preset_urls
              state: 'Netflix'
          sequence:
            - service: rest_command.screenpilot_set_url
              data:
                url: "https://netflix.com/browse"
                
        - conditions:
            - condition: state
              entity_id: input_select.screenpilot_preset_urls
              state: 'Custom URL'
          sequence:
            - service: rest_command.screenpilot_set_url
              data:
                url: "{{ states('input_text.screenpilot_custom_url') }}"

# Handle refresh button
- id: 'screenpilot_refresh_button'
  alias: 'ScreenPilot: Refresh Page'
  description: 'Refresh current page when button pressed'
  trigger:
    - platform: state
      entity_id: input_button.screenpilot_refresh
  condition: []
  action:
    - service: rest_command.screenpilot_reload_page

# Handle restart button
- id: 'screenpilot_restart_button'
  alias: 'ScreenPilot: Restart Browser'
  description: 'Restart browser when button pressed'
  trigger:
    - platform: state
      entity_id: input_button.screenpilot_restart
  condition: []
  action:
    - service: rest_command.screenpilot_restart_browser

# Turn off TV at night
- id: 'screenpilot_tv_night_off'
  alias: 'ScreenPilot: TV Off at Night'
  description: 'Turn off TV at 11 PM if on'
  trigger:
    - platform: time
      at: '23:00:00'
  condition:
    - condition: state
      entity_id: switch.screenpilot_tv
      state: 'on'
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.screenpilot_tv
    - service: notify.persistent_notification
      data:
        title: 'ScreenPilot'
        message: 'TV turned off for the night'

# Morning routine
- id: 'screenpilot_morning_routine'
  alias: 'ScreenPilot: Morning Routine'
  description: 'Turn on TV and show dashboard in morning'
  trigger:
    - platform: time
      at: '07:00:00'
  condition:
    - condition: state
      entity_id: switch.screenpilot_tv
      state: 'off'
  action:
    - service: switch.turn_on
      target:
        entity_id: switch.screenpilot_tv
    - delay:
        seconds: 5
    - service: rest_command.screenpilot_set_url
      data:
        url: "http://{{ states('input_text.home_assistant_internal_url') | default('homeassistant.local:8123') }}/lovelace"

# Alert on high CPU usage
- id: 'screenpilot_high_cpu_alert'
  alias: 'ScreenPilot: High CPU Alert'
  description: 'Alert when CPU usage is high'
  trigger:
    - platform: numeric_state
      entity_id: sensor.screenpilot_cpu
      above: 80
      for:
        minutes: 5
  condition: []
  action:
    - service: notify.persistent_notification
      data:
        title: 'ScreenPilot Alert'
        message: 'High CPU usage detected: {{ states("sensor.screenpilot_cpu") }}%'

# Volume control based on time
- id: 'screenpilot_volume_schedule'
  alias: 'ScreenPilot: Volume Schedule'
  description: 'Lower volume at night, raise in morning'
  trigger:
    - platform: time
      at: '21:00:00'
      id: 'night'
    - platform: time
      at: '08:00:00'
      id: 'morning'
  condition:
    - condition: state
      entity_id: switch.screenpilot_tv
      state: 'on'
  action:
    - choose:
        - conditions:
            - condition: trigger
              id: 'night'
          sequence:
            - repeat:
                count: 10
                sequence:
                  - service: rest_command.screenpilot_cec_command
                    data:
                      command: 'volume_down'
                  - delay:
                      seconds: 1
        - conditions:
            - condition: trigger
              id: 'morning'
          sequence:
            - repeat:
                count: 5
                sequence:
                  - service: rest_command.screenpilot_cec_command
                    data:
                      command: 'volume_up'
                  - delay:
                      seconds: 1

# Show weather when motion detected
- id: 'screenpilot_motion_weather'
  alias: 'ScreenPilot: Show Weather on Motion'
  description: 'Display weather when motion detected in morning'
  trigger:
    - platform: state
      entity_id: binary_sensor.living_room_motion  # Replace with your motion sensor
      to: 'on'
  condition:
    - condition: time
      after: '06:00:00'
      before: '10:00:00'
    - condition: state
      entity_id: switch.screenpilot_tv
      state: 'on'
  action:
    - service: rest_command.screenpilot_set_url
      data:
        url: 'https://weather.com'
    - delay:
        minutes: 5
    - service: rest_command.screenpilot_set_url
      data:
        url: "http://{{ states('input_text.home_assistant_internal_url') | default('homeassistant.local:8123') }}/lovelace"